<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Restaurant Dashboard</title>
<style>
  :root {
    --bg: #FAF7F2;
    --surface: #FFFFFF;
    --ink: #2B2420;
    --muted: #8A7F73;
    --accent: #C4501F;
    --accent-soft: #F3E2D5;
    --line: #EAE2D8;
    --live: #2F7A4F;
    --live-soft: #E3F0E8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  header {
    padding: 32px 24px 20px;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
  #connection-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
  }
  #connection-status .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
  }
  #connection-status.online .dot { background: var(--live); }
  #connection-status.online { color: var(--live); }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px;
  }
  section + section { margin-top: 36px; }
  section h2 {
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 12px;
  }
  .grid {
    display: grid;
    gap: 12px;
  }
  .item-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    transition: border-color 0.15s ease;
  }
  .item-card.is-live {
    border-color: var(--live);
    background: var(--live-soft);
  }
  .item-info h3 {
    margin: 0 0 2px;
    font-size: 16px;
    font-weight: 500;
  }
  .item-info .price {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--live);
    background: #fff;
    border: 1px solid var(--live);
    border-radius: 99px;
    padding: 3px 10px;
    margin-top: 6px;
  }
  button {
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: var(--accent-soft);
    color: var(--accent);
    transition: opacity 0.15s ease;
    white-space: nowrap;
  }
  button:hover { opacity: 0.8; }
  button:disabled {
    background: var(--live);
    color: white;
    cursor: default;
    opacity: 1;
  }
  .status-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border-radius: 99px;
    padding: 4px 10px;
    white-space: nowrap;
  }
  .status-pending { background: var(--accent-soft); color: var(--accent); }
  .status-accepted { background: var(--live-soft); color: var(--live); }
  #empty, #error, #orders-empty {
    color: var(--muted);
    font-size: 14px;
    padding: 8px 0 20px;
  }
</style>
</head>
<body>

<header>
  <h1>Restaurant dashboard</h1>
  <p>Pick which item customers see right now. Changes go live instantly.</p>
  <div id="connection-status"><span class="dot"></span><span id="connection-text">Connecting…</span></div>
</header>

<main>
  <div id="error"></div>

  <section>
    <h2>Menu</h2>
    <div id="list" class="grid"></div>
  </section>

  <section>
    <h2>Incoming orders</h2>
    <div id="orders-list" class="grid"></div>
    <p id="orders-empty">No orders yet.</p>
  </section>
</main>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const API_BASE = "http://localhost:4000";

  const listEl = document.getElementById("list");
  const ordersListEl = document.getElementById("orders-list");
  const ordersEmptyEl = document.getElementById("orders-empty");
  const errorEl = document.getElementById("error");
  const statusEl = document.getElementById("connection-status");
  const statusText = document.getElementById("connection-text");

  let items = [];
  let orders = [];

  // ---------- Menu picker ----------

  function renderItems() {
    listEl.innerHTML = "";
    items.forEach((item) => {
      const card = document.createElement("div");
      card.className = "item-card" + (item.isDisplayed ? " is-live" : "");

      const info = document.createElement("div");
      info.className = "item-info";
      info.innerHTML = `
        <h3>${item.name}</h3>
        <p class="price">₹${item.price}</p>
        ${item.isDisplayed ? '<span class="badge">LIVE</span>' : ""}
      `;

      const btn = document.createElement("button");
      btn.textContent = item.isDisplayed ? "Remove from live" : "Display this item";
      btn.onclick = () => setDisplayed(item._id, !item.isDisplayed);

      card.appendChild(info);
      card.appendChild(btn);
      listEl.appendChild(card);
    });
  }

  async function loadItems() {
    try {
      const res = await fetch(`${API_BASE}/api/menu/items`);
      items = await res.json();
      renderItems();
    } catch (err) {
      errorEl.textContent = "Could not reach the backend. Is server.js running on port 4000?";
    }
  }

  async function setDisplayed(id, isDisplayed) {
    try {
      await fetch(`${API_BASE}/api/menu/items/${id}/display`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ isDisplayed }),
      });
    } catch (err) {
      errorEl.textContent = "Could not update the displayed item. Check the backend connection.";
    }
  }

  // ---------- Incoming orders ----------

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function renderOrders() {
    if (orders.length === 0) {
      ordersListEl.innerHTML = "";
      ordersEmptyEl.style.display = "block";
      return;
    }
    ordersEmptyEl.style.display = "none";

    ordersListEl.innerHTML = orders
      .slice()
      .reverse()
      .map((order) => {
        const isAccepted = order.status === "accepted";
        const itemName = order.items?.[0]?.menuItem?.name || "Unknown item";
        const itemPrice = order.totalPrice || 0;
        const customerName = order.customer?.name || order.customerName || "Guest";
        return `
          <div class="item-card">
            <div class="item-info">
              <h3>${itemName} — ${customerName}</h3>
              <p class="price">₹${itemPrice} · ${formatTime(order.createdAt)}</p>
            </div>
            <span class="status-pill ${isAccepted ? "status-accepted" : "status-pending"}">
              ${isAccepted ? `Accepted` : "Pending"}
            </span>
          </div>
        `;
      })
      .join("");
  }

  async function loadOrders() {
    try {
      const res = await fetch(`${API_BASE}/api/orders`);
      orders = await res.json();
      renderOrders();
    } catch (err) {
      // menu error message above already covers a dead backend
    }
  }

  // ---------- Realtime sync ----------

  const socket = io(API_BASE);

  socket.on("connect", () => {
    statusEl.classList.add("online");
    statusText.textContent = "Live";
  });

  socket.on("disconnect", () => {
    statusEl.classList.remove("online");
    statusText.textContent = "Disconnected";
  });

  socket.on("menu:updated", (payload) => {
    const updatedItem = payload?.item || payload;
    if (!updatedItem?._id) return;
    items = items.map((item) => ({
      ...item,
      isDisplayed: item._id === updatedItem._id ? updatedItem.isDisplayed : item.isDisplayed,
    }));
    renderItems();
  });

  socket.on("order:new", (order) => {
    orders.push(order);
    renderOrders();
  });

  socket.on("order:updated", (updatedOrder) => {
    orders = orders.map((o) => (o._id === updatedOrder._id ? updatedOrder : o));
    renderOrders();
  });

  loadItems();
  loadOrders();
</script>

</body>
</html>
