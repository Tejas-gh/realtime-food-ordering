<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Order Food</title>
<style>
  :root {
    --bg: #FAF7F2;
    --surface: #FFFFFF;
    --ink: #2B2420;
    --muted: #8A7F73;
    --accent: #C4501F;
    --accent-soft: #F3E2D5;
    --line: #EAE2D8;
    --live: #2F7A4F;
    --live-soft: #E3F0E8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    max-width: 420px;
    padding: 32px 20px 16px;
    text-align: center;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 20px;
    font-weight: 600;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
  #connection-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
  }
  #connection-status .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
  }
  #connection-status.online .dot { background: var(--live); }
  #connection-status.online { color: var(--live); }

  main {
    width: 100%;
    max-width: 420px;
    padding: 12px 20px 40px;
  }
  .item-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border-radius: 99px;
    padding: 4px 12px;
    margin-bottom: 14px;
  }
  .badge-available, .badge-accepted {
    color: var(--live);
    background: var(--live-soft);
  }
  .badge-pending {
    color: var(--accent);
    background: var(--accent-soft);
  }
  .item-card h2 {
    margin: 0 0 6px;
    font-size: 24px;
    font-weight: 600;
  }
  .item-card .price {
    margin: 0 0 22px;
    color: var(--muted);
    font-size: 16px;
  }
  .name-input {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 15px;
    background: var(--bg);
    color: var(--ink);
    font-family: inherit;
  }
  .name-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .order-btn {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: white;
  }
  .order-btn:hover { opacity: 0.9; }
  .order-btn:disabled {
    background: var(--accent-soft);
    color: var(--muted);
    cursor: default;
  }
  .error-text {
    color: var(--accent);
    font-size: 13px;
    margin: 10px 0 0;
    min-height: 16px;
  }
  .status-line {
    color: var(--muted);
    font-size: 14px;
    margin: 0;
  }
  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 40px 0;
  }
</style>
</head>
<body>

<header>
  <h1>What's on the menu</h1>
  <p>This updates automatically — no need to refresh.</p>
  <div id="connection-status"><span class="dot"></span><span id="connection-text">Connecting…</span></div>
</header>

<main>
  <div id="content"></div>
</main>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const API_BASE = "http://localhost:4000";
  const contentEl = document.getElementById("content");
  const statusEl = document.getElementById("connection-status");
  const statusText = document.getElementById("connection-text");

  let currentItem = null;   // the menu item currently displayed by the restaurant
  let myOrder = null;       // the order this customer placed, once they place one
  let nameDraft = "";       // keeps the typed name across re-renders

  function render() {
    if (myOrder) {
      renderOrderStatus();
    } else {
      renderMenuCard();
    }
  }

  function renderMenuCard() {
    if (!currentItem) {
      contentEl.innerHTML = `<div class="empty-state">No item is being shown right now. Check back shortly.</div>`;
      return;
    }
    contentEl.innerHTML = `
      <div class="item-card">
        <span class="badge badge-available">AVAILABLE NOW</span>
        <h2>${currentItem.name}</h2>
        <p class="price">₹${currentItem.price}</p>
        <input class="name-input" id="name-input" type="text" placeholder="Your name" value="${nameDraft}" />
        <button class="order-btn" id="order-btn">Place order</button>
        <p class="error-text" id="order-error"></p>
      </div>
    `;
    document.getElementById("name-input").oninput = (e) => {
      nameDraft = e.target.value;
    };
    document.getElementById("order-btn").onclick = placeOrder;
  }

  function renderOrderStatus() {
    const isAccepted = myOrder.status === "accepted";
    const itemName = myOrder.items?.[0]?.menuItem?.name || "Your order";
    const itemPrice = myOrder.totalPrice || 0;
    contentEl.innerHTML = `
      <div class="item-card">
        <span class="badge ${isAccepted ? "badge-accepted" : "badge-pending"}">
          ${isAccepted ? "RIDER ON THE WAY" : "ORDER PLACED"}
        </span>
        <h2>${itemName}</h2>
        <p class="price">₹${itemPrice}</p>
        <p class="status-line">
          ${isAccepted ? "Accepted by a rider" : "Waiting for a rider to accept your order…"}
        </p>
      </div>
    `;
  }

  async function placeOrder() {
    const errorEl = document.getElementById("order-error");
    errorEl.textContent = "";

    if (!nameDraft.trim()) {
      errorEl.textContent = "Please enter your name first.";
      return;
    }

    if (!currentItem || !currentItem._id) {
      errorEl.textContent = "No item available. Check back soon!";
      return;
    }

    const btn = document.getElementById("order-btn");
    btn.disabled = true;
    btn.textContent = "Placing order…";

    try {
      const res = await fetch(`${API_BASE}/api/orders`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          customerName: nameDraft.trim(),
          restaurantId: currentItem.restaurant._id || currentItem.restaurant,
          items: [
            {
              menuItem: currentItem._id,
              quantity: 1,
              price: currentItem.price,
            },
          ],
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Could not place order");

      myOrder = data;
      render();
    } catch (err) {
      errorEl.textContent = err.message;
      btn.disabled = false;
      btn.textContent = "Place order";
    }
  }

  async function loadDisplayedItem() {
    try {
      const res = await fetch(`${API_BASE}/api/menu/displayed`);
      currentItem = await res.json();
      render();
    } catch (err) {
      contentEl.innerHTML = `<div class="empty-state">Could not reach the backend. Is server.js running?</div>`;
    }
  }

  const socket = io(API_BASE);

  socket.on("connect", () => {
    statusEl.classList.add("online");
    statusText.textContent = "Live";
  });

  socket.on("disconnect", () => {
    statusEl.classList.remove("online");
    statusText.textContent = "Disconnected";
  });

  // Only matters before an order is placed - once placed, the item card
  // is replaced by the order tracker and stops reacting to menu changes.
  socket.on("menu:updated", (updatedItem) => {
    currentItem = updatedItem;
    if (!myOrder) render();
  });

  // Fires when a rider accepts ANY order - we only care if it's ours.
  socket.on("order:updated", (updatedOrder) => {
    if (myOrder && updatedOrder._id === myOrder._id) {
      myOrder = updatedOrder;
      render();
    }
  });

  loadDisplayedItem();
</script>

</body>
</html>
