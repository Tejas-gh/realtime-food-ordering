<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rider App</title>
<style>
  :root {
    --bg: #FAF7F2;
    --surface: #FFFFFF;
    --ink: #2B2420;
    --muted: #8A7F73;
    --accent: #C4501F;
    --accent-soft: #F3E2D5;
    --line: #EAE2D8;
    --live: #2F7A4F;
    --live-soft: #E3F0E8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    max-width: 480px;
    padding: 32px 20px 16px;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 20px;
    font-weight: 600;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
  #connection-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
  }
  #connection-status .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
  }
  #connection-status.online .dot { background: var(--live); }
  #connection-status.online { color: var(--live); }

  .name-input {
    width: 100%;
    padding: 11px 14px;
    margin-top: 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 14px;
    background: var(--surface);
    color: var(--ink);
    font-family: inherit;
  }
  .name-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    margin-top: 18px;
    display: grid;
    gap: 10px;
  }

  .auth-card h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }

  .auth-card p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }

  .auth-btn {
    border: none;
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: white;
  }

  .auth-btn:disabled {
    background: var(--accent-soft);
    color: var(--muted);
    cursor: default;
  }

  .auth-error {
    color: #B42318;
    font-size: 13px;
    display: none;
  }

  .hidden { display: none !important; }

  main {
    width: 100%;
    max-width: 480px;
    padding: 8px 20px 40px;
  }
  .grid {
    display: grid;
    gap: 12px;
  }
  .delivery-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .delivery-info h3 {
    margin: 0 0 2px;
    font-size: 16px;
    font-weight: 500;
  }
  .delivery-info .meta {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }
  .accept-btn {
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: white;
    white-space: nowrap;
  }
  .accept-btn:hover { opacity: 0.9; }
  .accept-btn:disabled {
    background: var(--accent-soft);
    color: var(--muted);
    cursor: default;
  }
  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 40px 0;
  }
</style>
</head>
<body>

<header>
  <h1>Available deliveries</h1>
  <p>New orders show up here the moment they're placed.</p>
  <div id="connection-status"><span class="dot"></span><span id="connection-text">Connecting…</span></div>
  <input class="name-input hidden" id="rider-name" type="text" placeholder="Your name (used when you accept a delivery)" />

  <div class="auth-card" id="auth-card">
    <h2>Rider sign in</h2>
    <p>Use the demo rider account seeded in the backend.</p>
    <input class="name-input" id="rider-email" type="email" placeholder="Email" />
    <input class="name-input" id="rider-password" type="password" placeholder="Password" />
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-btn" id="auth-btn" type="button">Sign in</button>
  </div>
</header>

<main>
  <div id="list" class="grid"></div>
</main>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const API_BASE = "http://localhost:4000";

  const listEl = document.getElementById("list");
  const statusEl = document.getElementById("connection-status");
  const statusText = document.getElementById("connection-text");
  const riderNameInput = document.getElementById("rider-name");
  const authCard = document.getElementById("auth-card");
  const authError = document.getElementById("auth-error");
  const authBtn = document.getElementById("auth-btn");
  const riderEmailInput = document.getElementById("rider-email");
  const riderPasswordInput = document.getElementById("rider-password");

  let authToken = localStorage.getItem("riderToken");
  let riderUser = null;
  try {
    riderUser = localStorage.getItem("riderUser") ? JSON.parse(localStorage.getItem("riderUser")) : null;
  } catch (error) {
    riderUser = null;
  }

  let deliveries = []; // orders with status "pending"

  function setSignedInState(user, token) {
    authToken = token;
    riderUser = user;
    localStorage.setItem("riderToken", token);
    localStorage.setItem("riderUser", JSON.stringify(user));
    riderNameInput.value = user?.name || "";
    riderNameInput.classList.remove("hidden");
    authCard.classList.add("hidden");
  }

  function requireAuthHeaders() {
    return authToken ? { Authorization: `Bearer ${authToken}` } : {};
  }

  async function signIn() {
    const email = riderEmailInput.value.trim();
    const password = riderPasswordInput.value;
    authError.style.display = "none";
    if (!email || !password) {
      authError.textContent = "Enter email and password.";
      authError.style.display = "block";
      return;
    }

    authBtn.disabled = true;
    authBtn.textContent = "Signing in...";

    try {
      const res = await fetch(`${API_BASE}/api/auth/rider-login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || "Login failed");
      }
      setSignedInState(data.user, data.token);
      await loadAvailableDeliveries();
    } catch (error) {
      authError.textContent = error.message;
      authError.style.display = "block";
    } finally {
      authBtn.disabled = false;
      authBtn.textContent = "Sign in";
    }
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function render() {
    if (deliveries.length === 0) {
      listEl.innerHTML = `<div class="empty-state">No deliveries waiting right now.</div>`;
      return;
    }
    listEl.innerHTML = deliveries
      .map(
        (order) => `
        <div class="delivery-card">
          <div class="delivery-info">
            <h3>${order.itemName}</h3>
            <p class="meta">For ${order.customerName} · ₹${order.itemPrice} · ${formatTime(order.createdAt)}</p>
          </div>
          <button class="accept-btn" data-id="${order.id}">Accept delivery</button>
        </div>
      `
      )
      .join("");

    listEl.querySelectorAll(".accept-btn").forEach((btn) => {
      btn.onclick = () => acceptDelivery(Number(btn.dataset.id), btn);
    });
  }

  async function acceptDelivery(orderId, btn) {
    const riderName = riderNameInput.value.trim();
    if (!riderName) {
      riderNameInput.focus();
      riderNameInput.placeholder = "Enter your name first";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Accepting…";

    try {
      const res = await fetch(`${API_BASE}/api/orders/${orderId}/accept`, {
        method: "POST",
        headers: { ...requireAuthHeaders(), "Content-Type": "application/json" },
        body: JSON.stringify({ riderName }),
      });
      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.error || "Could not accept this delivery");
      }
      // The order:updated broadcast (below) removes it from everyone's list,
      // including ours - no need to update local state manually here.
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Accept delivery";
      alert(err.message);
    }
  }

  async function loadAvailableDeliveries() {
    if (!authToken) {
      listEl.innerHTML = `<div class="empty-state">Sign in to see available deliveries.</div>`;
      return;
    }
    try {
      const res = await fetch(`${API_BASE}/api/orders/available`, {
        headers: requireAuthHeaders(),
      });
      deliveries = await res.json();
      render();
    } catch (err) {
      listEl.innerHTML = `<div class="empty-state">Could not reach the backend. Is server.js running?</div>`;
    }
  }

  const socket = io(API_BASE);

  socket.on("connect", () => {
    statusEl.classList.add("online");
    statusText.textContent = "Live";
  });

  socket.on("disconnect", () => {
    statusEl.classList.remove("online");
    statusText.textContent = "Disconnected";
  });

  // A brand new order just came in - it's available for anyone to accept
  socket.on("order:new", (order) => {
    if (!authToken) return;
    deliveries.push(order);
    render();
  });

  // Someone accepted an order (maybe us, maybe another rider) - either way
  // it's no longer available, so remove it from this list.
  socket.on("order:updated", (updatedOrder) => {
    if (!authToken) return;
    deliveries = deliveries.filter((d) => d.id !== updatedOrder.id);
    render();
  });

  if (authToken && riderUser) {
    setSignedInState(riderUser, authToken);
  } else {
    listEl.innerHTML = `<div class="empty-state">Sign in to see available deliveries.</div>`;
  }

  authBtn.onclick = signIn;
  riderPasswordInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      signIn();
    }
  });

  loadAvailableDeliveries();
</script>

</body>
</html>
